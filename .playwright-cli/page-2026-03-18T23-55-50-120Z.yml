  - generic [ref=e170]:
    - heading "FAQs" [level=1] [ref=e171]
    - generic [ref=e172]:
      - generic [ref=e173]:
        - heading "What is BatchoCanvas?" [level=3] [ref=e174]
        - paragraph [ref=e175]: BatchoCanvas is a freeform design canvas for creating both static and animated content. Design visually using layers and multiple canvases, animate elements with a built-in timeline, apply masking and blend modes, and export your work as images, videos, or PDFs.
      - generic [ref=e176]:
        - heading "Do I need design or animation experience to use it?" [level=3] [ref=e177]
        - paragraph [ref=e178]: No. BatchoCanvas is built to feel intuitive and approachable. If you’re comfortable working with layers and arranging elements on a canvas, you can start creating right away—no animation or video editing background required.
      - generic [ref=e179]:
        - heading "How does BatchoCanvas differ from traditional editors?" [level=3] [ref=e180]
        - paragraph [ref=e181]: Most tools force you to choose between static design and timeline-based editing. BatchoCanvas combines both. You design directly on a canvas, then use the timeline only when you want to animate elements—without disrupting your layout or workflow.
      - generic [ref=e182]:
        - heading "Can I export in different formats and sizes?" [level=3] [ref=e183]
        - paragraph [ref=e184]: Yes. BatchoCanvas supports common aspect ratios as well as custom canvas sizes. You can export each canvas as an image, video, or PDF, depending on how you plan to use it.
      - generic [ref=e185]:
        - heading "How do multiple canvases (scenes) work?" [level=3] [ref=e186]
        - paragraph [ref=e187]: You can create multiple canvases within a single project. Each canvas acts like its own scene, making it easy to create variations, sequences, or different formats—then export each one individually or together.
      - generic [ref=e188]:
        - heading "Are my projects saved?" [level=3] [ref=e189]
        - paragraph [ref=e190]: Yes. All projects are saved to your account so you can return, edit, and export at any time. Your work stays organized and accessible.
      - generic [ref=e191]:
        - heading "What types of content is BatchoCanvas best for?" [level=3] [ref=e192]
        - paragraph [ref=e193]: BatchoCanvas works well for social media content, posters, animated graphics, short videos, presentations, storyboards, and other visual assets—whether static or animated.
      - generic [ref=e194]:
        - heading "Is BatchoCanvas still evolving?" [level=3] [ref=e195]
        - paragraph [ref=e196]: Yes. BatchoCanvas is actively developed, with ongoing updates focused on performance, usability, and expanding creative capabilities.
      - generic [ref=e197]:
        - heading "How much can I create?" [level=3] [ref=e198]
        - paragraph [ref=e199]: That depends on your plan. You can start for free to explore BatchoCanvas, with options to upgrade for higher limits and additional export capabilities.
